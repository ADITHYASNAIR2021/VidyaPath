name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality-and-build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test_anon_key
      SESSION_SIGNING_SECRET: test_session_signing_secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Verify Context Index
        run: npm run verify:context

      - name: Check Dataset Quality
        run: npm run check:data-quality

      - name: Build
        run: npm run build

      - name: Runtime Readiness Gate
        run: |
          npm run start &
          SERVER_PID=$!
          READY_OK=0
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/health/ready > ready.json; then
              READY_OK=1
              break
            fi
            sleep 2
          done
          cat ready.json || true
          kill $SERVER_PID || true
          if [ "$READY_OK" -ne 1 ]; then
            echo "Readiness endpoint did not become healthy in time."
            exit 1
          fi

      - name: Auth Matrix Smoke
        run: |
          npm run start &
          SERVER_PID=$!
          READY_OK=0
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/health/ready > /dev/null; then
              READY_OK=1
              break
            fi
            sleep 2
          done
          if [ "$READY_OK" -ne 1 ]; then
            echo "Server did not become healthy for auth smoke checks."
            kill $SERVER_PID || true
            exit 1
          fi
          npm run check:auth-matrix
          EXIT_CODE=$?
          kill $SERVER_PID || true
          exit $EXIT_CODE
